services:
  web:
    build: .
    env:
      - DATABASE_URL: ${{ secrets.DATABASE_URL }}$
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
